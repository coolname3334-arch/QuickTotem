name: Build QuickTotem

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        working-directory: QuickTotem/QuickTotem
        run: gradle wrapper --gradle-version 9.4.0

      - name: Build with Gradle
        working-directory: QuickTotem/QuickTotem
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: QuickTotem
          path: QuickTotem/QuickTotem/build/libs/quicktotem-*.jar
          if-no-files-found: error
